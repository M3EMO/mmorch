[project]
name = "mmorch"
version = "0.1.0"
description = "Multi-model orchestration harness (migrated patterns) for Claude Code projects"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.40.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.2.0"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["mmorch"]
